kind = "web"
previewPath = "/"
title = "Uber Rentals - Vehicle Experience"
version = "1.0.0"
id = "artifacts/uber-rentals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21087

[services.development]
run = "pnpm --filter @workspace/uber-rentals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uber-rentals", "run", "build" ]
publicDir = "artifacts/uber-rentals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21087"
BASE_PATH = "/"
